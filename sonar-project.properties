# ========================
# SonarCloud Configuration
# ========================

sonar.projectKey=rujleon_qualimetrie-audit
sonar.organization=rujleon

# Sources et tests (ATTENTION: pas de wildcards ici !)
sonar.sources=.
sonar.tests=.

# Exclusions (les wildcards sont autorisés ICI)
sonar.exclusions=node_modules/**,.github/**,coverage/**,lcov-report/**,dist/**,build/**,**/*.config.js,**/*.spec.js

# Pour que SonarCloud trouve les fichiers de test
sonar.test.inclusions=**/*.test.js

# Couverture Jest
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Encodage
sonar.sourceEncoding=UTF-8